services:

  db:
    image: postgres:14.23-alpine3.24
    restart: always
    shm_size: 128mb
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sisteminha_embrapa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/sisteminha_embrapa?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      IOT_API_BASE_URL: ${IOT_API_BASE_URL:-http://localhost:8080/api}
      NODE_ENV: development
      SCHEDULER_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: